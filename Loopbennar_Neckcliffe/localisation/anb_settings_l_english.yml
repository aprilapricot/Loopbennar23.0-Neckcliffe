 #Great Conqueror event loca
 great_conqueror.2.t:0 "A Lich-King Rises"
 great_conqueror.2.d:0 ""I throw myself upon your visage. You see all that I am, and I am perfect."\n-Theknial's Catechism, Final Page.\n\nMany have dared to attempt the foul rituals of ascension in the past, though few have succeeded in defiling mortality itself and achieving Lichdom. One cannot stomach such cruelty without a will of iron and a heart of tar. But this has not stopped the [From.Monarch.GetTitle] of [From.GetName] from spurning purity and becoming a being of pure evil: a true Lich.\n\nHordes of zombies, skeletons, and whatever horrors the Lich-King [From.Monarch.GetName] has mustered march upon the world, and we have only seen the beginning of a new necromantic demesne."
 great_conqueror.2.a:0 "We must take it upon ourselves to right their wrongs."

 lich_king_tt:0 "Â§RThe undead armies of [From.GetName] will sweep across Halann. We must be prepared.Â§!"

 great_conqueror.6.t:0 "Triumph of the Crimson Caehn"
 great_conqueror.6.d:0 "What little trade we had with the vast and wild lands of the Forbidden Plains has crept entirely to a halt in recent months. What few have managed to escape have told us why. The centaurs are unifying under a new Great Caehn, and the Forbidden Plains have erupted into a terrible war.\n\nThe grasses weep blood, they say. The peals of thunder across the plains are drowned out by the screams of the dying, and the wails of the soon-to-be dead.\n\nThere has been war for months upon months, but the Great Caehn is gaining strength, and soon the centaurs, all of the centaurs alive, will spill out beyond the Forbidden Plains. They will come for us.\n\nFirst they will send us messengers. Then they will send us scouts. Then they will send us a horde without horizon, and our lands will suffer the same fate as the Forbidden Plains."
 great_conqueror.6.a:0 "The great stampede has begun."

 seat_of_centaur_gc:0 "Seat of the Crimson Caehn"

 caehn_vc_tt:0 "Â§RA dreadful storm brews over the Forbidden Lands. We must prepare, lest we are blown asunder by the winds of Irdaeos.Â§!"

 great_conqueror.8.t:0 "The Vile One Rises"
 great_conqueror.8.d:0 "There is a place in Sarhal where the fog lies deep.\n\nIt licks at the stony hem of palaces and settles in the alleyways. One cannot always keep it out of doors. It is said that the fog itself listens to what you say, that one can never be sure of privacy in a town to which the fog has arrived. Stranger still, it is said that the fog was invited; that a realm steeped in the corruption of the three hags of Yezel Mora has pledged itself entirely to their cause.\n\nYet it is not the hags who rule in this befogged country, as they rule Yezel Mora. Instead the Wise Three have sent an apprentice, a daughter in shadow, a figure referred to only as the Vile One. Possessing terrible arcane power of her own, this Vile One advances the agenda of the hags in her own right, and has taken direct command of her inheritance.\n\nA new agent of shadow menaces Sarhal, and all right-thinking people tremble at the prospect."
 great_conqueror.8.a:0 "The Umbral Covenant has been sworn."

 umbral_covenant_gc:0 "The Umbral Horde"

 vile_one_vc_tt:0 "Â§RA great menace claws forth from the shadows. We must be prepared, lest we fall to the encroaching dark."