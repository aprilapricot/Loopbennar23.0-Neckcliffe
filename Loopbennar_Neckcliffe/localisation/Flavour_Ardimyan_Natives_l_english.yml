 ### Generic Mission custom tooltips
 #Missions Column 1
 AYN_military_innovations_mod_refresh_yes_tt:0 "£yes£If we have 5 or more §YQeyikul Reputation§! when we form §YJinnakah§! we will §YRenew§! this effect for §Y20 years§!"

 AYN_military_innovations_mod_refresh_no_tt:0 "£no£If we have 5 or more §YQeyikul Reputation§! when we form §YJinnakah§! we will §YRenew§! this effect for §Y20 years§!"

 AYN_50_50_convert_provinces_tt:0 "§Y50%§! of our §YTribal Land Provinces§! will convert to §YGenie Cult§!"

 #Missions Column 2
 AYN_ardimyan_prosperity_yes_tt:0 "£yes£If §YEvery Tribal Land Province§! does not have any §YQeyikul Warbands§! we will gain an Extra §G1.5 Monthly Tribal Development§!"

 AYN_ardimyan_prosperity_no_tt:0 "£no£If §YEvery Tribal Land Province§! does not have any §YQeyikul Warbands§! we will gain an Extra §G1.5 Monthly Tribal Development§!"

 AYN_2_5_qeyikul_in_tribal_land_tt:0 "Less than 3 provinces part of our tribal land have a §YQeykul Warband§!"

 #Missions Column 3
 AYN_event_insight_meeting_of_tribes:0 "§GEvent Insight§!\n\nWe will call the Guryadaggan Tribes to a meeting where we can either try to resolve any conflicts between tribes, increasing their §YOpinion§! of us and our [Root.Monarch.GetTitle]'s §YDiplomatic Reputation§! or we can join in the arguments to increase our §YPrestige§! and increase our troops §YShock Damage§! whilst also reducing our [Root.Monarch.GetTitle]'s §YDiplomatic Reputation§!"

 AYN_walaalay_bonds_1.1_effect_tt:0 "§TIf:§!\nIf we have an Ally with §G200 Opinion§! and §G65 Trust§!:"

 AYN_walaalay_bonds_1.2_effect_tt:0 "we will §GVassalize§! them, and they gain the following:"

 AYN_walaalay_bonds_2_effect_tt:0 "If we have §YNo Allies§!:"

 AYN_every_loyal_vassal_TD_tt:0 "For every loyal Guryadagga vassal we will get §G0.0125 Monthly Tribal Development§!\n"

 AYN_need_all_legacies_tt:0 "We need every §YGenie Legacy§! Modifier"

 AYN_against_world_refresh_yes_tt:0 "If we have the §YAgainst The World§! modifier we will:\n£yes£ Refresh '§YAgainst The World§!' for §Y20 years§!, §Yupgrading§! it to the following effects:\n Movement Speed §G+10%§!\n Siege Ability §G+10%§!\n Liberty Desire in Subjects §G-7.50%§!\n"

 AYN_against_world_refresh_no_tt:0 "If we have the §YAgainst The World§! modifier we will:\n£no£ Refresh '§YAgainst The World§!' for §Y20 years§!, §Yupgrading§! it to the following effects:\n Movement Speed §G+10%§!\n Siege Ability §G+10%§!\n Liberty Desire in Subjects §G-7.50%§!\n"

 AYN_change_government_tt:0 "We will become a §YTheocracy§! along with all of our subjects"

 AYN_get_6063_6584_from_reforming_tt:0 "\nIf §YArdim Qarast§! or §YQasrig Alahmar§! is owned by One of our subjects, they will cede the province to us\n"

 ardimyan_sultanate_planetouched_tt:0 "Our §YRulers§! and §YHeirs§! will §GAlways§! be Planetouched"

 #Mission Column 4
 AYN_chosen_of_ardimya_desc:0 "Whenever we would gain a §YCult Power§! to cast in our §YIncantations§! we will have a §Y10%§! chance to gain Two §YCult Power§! instead of One"

 AYN_chosen_of_ardimya_mana_gain_tt:0 "\nIf we have cast §Y6 Incantations§! (Currently [Root.GeniCultUsageCounter.GetValue]), and §Y2 Incantations§! that cost §Y3§! or more §YCult Power§! (Currently [Root.GeniCultUsageCounter3plus.GetValue])"

 AYN_chosen_of_ardimya_yes_tt:0 "£yes£Whenever we cast a §YMajor Incantation§! or higher we will also gain §M10 Mana§! for each §YCult Power§! we spend with a maximum gain of §M30 Mana§!"

 AYN_chosen_of_ardimya_no_tt:0 "£no£Whenever we cast a §YMajor Incantation§! or higher we will also gain §M10 Mana§! for each §YCult Power§! we spend with a maximum gain of §M30 Mana§!"

 ### Modifier locs
 AYN_chosen_of_ardimya_modifier_desc_tt:0 "Whenever we would gain a §YCult Power§! to cast in our §YIncantations§! we will have a §Y10%§! chance to gain Two §YCult Power§! instead of One"


 ### Qeyikul System
 AYN_owning_a_warband_unrest_tt:0 "Owning a Large Qeyikul Warband will grant §R+2 National Unrest§!"

 AYN_small_qeyikul_tt:0 "We will fight a §YSmall§! Qeyikul Warband, due to their size they will have §YLow Organisation§! and will therefore be easier to defeat"

 AYN_medium_qeyikul_tt:0 "We will fight a §YMedium§! Qeyikul Warband"

 AYN_large_qeyikul_tt:0 "We will fight a §RLarge§! Qeyikul Warband, due to their immense size it is recomended to provoke these warbands with caution"

 AYN_qeyikul_warband_small_rewards_tt:0 "We will fight a Small §YQeiykul Warband§!\nIf we §GWin§! against them:\n§G+5 Prestige\n+1 Qeyikul Reputation§!\n\nIf we §RLose§! then we will lose:\n§R-1 Qeyikul Reputation§!\n§R33 Devastation in Capital§!\n\n"

 AYN_qeyikul_warband_medium_rewards_tt:0 "We will fight a Medium §YQeiykul Warband§!\nIf we §GWin§! against them:\n§G+10 Prestige\n+1 Qeyikul Reputation\n+25 Opinion with Guryadaggan Nations\n+50 Crowns\nOne 33% Cheaper Migration\n-25% Add Tribal Land Cost in Current Capital§!\n\nIf we §RLose§! then we will lose:\n§R-1 Qeyikul Reputation\n-75 Mil Power\n+10% Liberty Desire in Subjects\n100 Devastation in Capital§!\n\n"

 AYN_qeyikul_warband_large_rewards_tt:0 "We will fight a Large §YQeiykul Warband§!\nIf we §GWin§! against them:\n§G+15 Prestige\n+2 Qeyikul Reputation\n+50 Opinion with Guryadaggan Nations\n+75 Crowns\n+5% Discipline\n+5 Trust with all Guryadaggan Nations\n-50 Devastation in Capital\nMake Current Province Tribal Land§!\n\nIf we §RLose§! then we will lose:\n§R-1 Qeyikul Reputation\n-20 Prestige\n-100 Mil Power\nLose all Bonuses gained from fighting Warbands\nWe will not be able to Migrate for One Year§!\n\n"

 AYN_not_fighting_warbands_tt: "We are not fighting a §YQeyikul Warband§!"

 ### Legacy System
 you_got_a_legacy_tt:0 "You have gained a §YGenie Legacy§! by migrating, giving you a §YPermanent Modifier§! due to their magical energy\nLegends say there are §Y3§! Legacies lost in Ardimya's Sands and §YAmubariz§! flaunts one openly"
 S87_we_start_with_a_legacy_tt:0 "Your tribe starts with a §YGenie Legacy§! giving you a §YPermanent Modifier§! due to their magical energy\nLegends say there are §Y3§! Legacies lost in Ardimya's Sands"

 ### Non-Generic custom tooltips
 #S85
 S85_green_hierophant_yes_tt:0 "£yes£We will use minor invisiblity wards to §Ykidnap a Random Enemy General§!, forcing them to work as one of our commanders. However, if we capture a War Wizard they will not cast magic for us."
 S85_green_hierophant_no_tt:0 "£no£ We are §YNot at War§! so we can't use the Hierophant to capture an §YEnemy general§!"
 S85_3_units_in_Kazriadoka_tt: "If we have 3 units in the province of §YKaziradoka§! They will gain §G+10% Moral of Armies§! and §G-5 Years of Sepratism§! and we will gain §YKombedak§! as an free accepted culture"
 S85_has_activated_due_judgement_tt:0 "We have currently or previously activated the §YMajor§! Genie Cult Incantation §YDue Judgement§!"
 S85_has_warmth_of_life_tt:0 "We currently have the effect §YWarmth of life§! from casting an Incantation"
 S85_unlock_unique_incantation_tt:0 "We will lose §Y2 Genie Cult Power§! and unlock a unique Genie Cult Incantation called §YGreen Hierophant§!, a powerful spell which will allow us to steal a top-brass random enemy general"
 S85_in_5_years_province_better_tt:0 "In 7.5 years, §YArdim Qarast§! will gain §Y1/1/1§! development along with a §YMerfolk Settlement§!"

 #S86
 S86_raid_human_can_fight_tt:0 "As a player owns a province in the Baashi Badda area they can choose to fight our raid if we raid their land"
 S86_yes_ships_needed_to_raid_islands_tt:0 "£yes£If we have §Y4§! ships we can also raid §YCusuub Qasr§! and §YMagaalad Qasr§!"
 S86_no_ships_needed_to_raid_islands_tt:0 "£no£If we have §Y4§! ships we can also raid §YCusuub Qasr§! and §YMagaalad Qasr§!"
 S86_every_none_island_province_gets_raided_tt:0 "We will §YRaid Qasri Almadeheda§! and §YDagaalsh Baashi§!"
 S86_unique_genie_cult_tt:0 "Every owned province in the §YDjinnakah§! subcontinent will get:"
 S86_unlock_unique_incantation_tt:0 "We will lose §Y2 Genie Cult Power§! and unlock a unique Genie §YCult Incantation§! called §YHighway Star§!, a powerful spell which will allow us to travel faster in any owned province in the Djinnakah region"

 #S87
 S87_unlock_unique_incantation_tt:0 "We will lose §Y3 Genie Cult Power§! and unlock a unique Genie §YCult Incantation§! called §YPlanet Waves§!, a powerful spell which will boost our armies shock damage for a short period"
 S87_has_any_other_legacy_tt:0 "We have any other non-Faasas §YLegacy§!"
 S87_manpower_gain_from_incantations_tt:0 "Whenever we cast an §YIncantations§! we will gain §Y1000§! manpower per §YCult Power§! we used to cast it"
 S87_affinity_with_balsam_tt:0 "Up to §Y3§! provinces with a §YPlant§! trade good which is either owned by us or is in our §YTribal Land§! will receive the §YAffinty with Balsam§! Modifier.\nEvery §YIncense§! province we currently own will also get this modifier"
 S87_has_15_opinion_or_opinion_mod:0 "Has §Y150§! improved relations or §Y15§! opinion from subsidies (after you stop subsidising)"

 #S88
 S88_unlock_unique_incantation_tt:0 "We will lose §Y2 Genie Cult Power§! and unlock a unique Genie §YCult Incantation§! called §YAqua Necklace§!, a powerful spell which will summon §Ysailors§! for us depending on how many §YMerfolk Settlements§! we have in our provinces or tribal land"
 S88_sea_migration_tt:0 "We will §YMigrate§! across the seas and claim the land we find as our §YTribal Land§!"
 S88_we_have_migrated_here_before:0 "§RWARNING§!\n This province is already our §YTribal Land§!, we will gain nothing for migrating here\n"
 S88_come_back_to_the_mainland_tt:0 "We will return back to §YAwliyo Aadan§! and the mainland of Ardimya"
 S88_gain_terra_cores_on_island_tt:0 "If we have every island in Ardmiya, apart from §YPumzish Haayo§!, as a part of our §YTribal Land§! we will get §YTerritorial Cores§! on §YCusuub Qasr§! and §YMagaalad Qasr§!"
 S88_island_qeyikul_move_and_fight_tt:0 "We will migrate to §YHwasadaa§! and fight the §YQeyikul Warband§! located there"
 S88_sailor_gain_explain_tt:0 "For every §YOwned Province§! which has a §YMerfolk Settlement§! we will gain §Y2000§! sailors, up to a maximum of §Y10000§!\n For every §YTribal Land Province§! which has a §YMerfolk Settlement§!, we will also gain §Y2000§! sailors"

