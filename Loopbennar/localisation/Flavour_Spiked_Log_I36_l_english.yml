 #Events
 flavor_spiked_log.1.t:0 "Punish the Traitor"
 flavor_spiked_log.1.d_1:0 "[Root.Monarch.GetTitle], envoys have come from Spiked Log. They offer to assist us in crushing the Oubbligschild clan, the surviving legacy from the despicable traitor Oubblig. Should they succeed, they ask in exchange for our loyalty. It may be a small price to pay for us to satisfy our revenge and erase that stain on our clan once and for all. What should we answer?"
 flavor_spiked_log.1.d_2:0 "[Root.Monarch.GetTitle], envoys have come from Spiked Log. They offer to assist us in securing our southern border and reclaim Oubbligschild lands. Should they succeed, they ask in exchange for our loyalty. It may be a small price to pay for us to satisfy our revenge and erase that stain on our clan once and for all. What should we answer?"
 flavor_spiked_log.1.a:0 "Sure, let them take the lead."
 flavor_spiked_log.1.b:0 "Sure, we will take the lead."
 flavor_spiked_log.1.c:0 "No way, we would have no chance of winning!"
 flavor_spiked_log.1.e:0 "Sure, it’s always good to have a reliable ally."
 
 flavor_spiked_log.2.t:0 "Punish the Traitor"
 flavor_spiked_log.2.d_1:0 "[Root.Monarch.GetTitle], our envoys to the Brambleskinner clan came back with their answer. We offered our trusted ally our assistance in crushing the Oubbligschild clan, the heirs of the despicable Oubblig who betrayed them by pactizing with the fey. When we succeed, we ask them in exchange to pledge their loyalty to us. It is but a small price to pay for them to satisfy their revenge and erase that stain on their clan once and for all. Our army stands ready to march."
 flavor_spiked_log.2.d_2:0 "[Root.Monarch.GetTitle], our envoys to the Brambleskinner clan came back with their answer. We offered our trusted ally our assistance in securing their southern border and reclaim Oubbligschild lands. When we succeed, we ask them in exchange to pledge their loyalty to us. It is but a small price to pay for for them to satisfy their revenge and erase that stain on their clan once and for all."
 flavor_spiked_log.2.a:0 "We will take the lead. To war!"
 flavor_spiked_log.2.b:0 "They will take the lead. To war!"
 flavor_spiked_log.2.c:0 "The cowards refused!"
 flavor_spiked_log.2.e:0 "We will be stronger together!"

 flavor_spiked_log.3.t:0 "Spiked Log demands fealty"
 flavor_spiked_log.3.d:0 "[Root.Monarch.GetTitle], envoys from Spiked Log have come. They demand our fealty as a reward from their assistance. They did help us in our fight against Oubblig's legacy, and we had agreed to pledge our loyalty to them if they won."
 flavor_spiked_log.3.a:0 "Why should we comply? We would have won anyway."
 flavor_spiked_log.3.b:0 "A deal is a deal."

 flavor_spiked_log.4.t:0 "A Durable Arrangement"
 flavor_spiked_log.4.d:0 "Oubblig's legacy is no more. The Brambleskinner clan got its revenge and stands strong. For now. Even with reuniting their clan, other countries are waiting to seize their lands. They are surrounded by numerous orcish warbands still view them - and us - as little more than slaves. As for the elves, they always seek to take back what they see as their legitimate possessions. Who knows for how long their squabbles will prevent them from attacking with the full might of their Verdant Pact? We sent envoys to Brambleskinner to remind them that it would be in their best interest to accept our rule and receive permanent protection."
 flavor_spiked_log.4.a:0 "They accepted!"
 flavor_spiked_log.4.b:0 "They refused! Damnation!"

 flavor_spiked_log.5.t:0 "Tales about Corin"
 flavor_spiked_log.5.d:0 "The tale continues with Corin's role in destroying the Verdant Veil, and how she accepted goblins with her. The storyteller also explains that stories of her results in many goblins wanting to join the army, on the offchance they could distinguish themselves if a similar event ever happens in the future."
 flavor_spiked_log.5.a:0 "A fine tale indeed!"

 flavor_spiked_log.6.t:0 "Brambled Log"
 flavor_spiked_log.6.d:0 "Recently, we grew closer and closer together with Brambleskinner. They even tell us of other goblin cousins to the south-west. We now have the opportunity to merge our clans, and get another entry-point on Bulwar."
 flavor_spiked_log.6.a:0 "Brambleskinner is our loyal subject."
 flavor_spiked_log.6.b:0 "We should integrate the Brambleskinner clan."

 flavor_spiked_log.7.t:0 "Cutting Through"
 flavor_spiked_log.7.d:0 "We need to continue our momentum and strike the Silentblade clan. That way, we'll no longer be surrounded by orcs and elves. Some advisor tell that rashly cutting trees for fortification is not sustainable (less trees, less protection against the elves), and they suggest formalizing woodcutting"
 flavor_spiked_log.7.a:0 "Onwards!"
 
 flavor_spiked_log.8.t:0 "Under the Bright Sun"
 flavor_spiked_log.8.d:0 "We sent small groups outside the Deepwoods to see if we could find new allies. The door to the south is shut tight, and the group that went to the mountain in the east never came back. Yet, through the pass south-east, we learnt of a queendom that seemed open to engaging with us."
 flavor_spiked_log.8.a:0 "Let us hope that their queens are magnanimous"
  
 flavor_spiked_log.9.t:0 "Old Ways, and New"
 flavor_spiked_log.9.d:0 "The Bulwari mercenaries practice very different religions that are new to us. We asked for one of them to come and teach us what their religion entails, and two people came : a harpy explaining the way of the Hunt and a lean elf who professed his faith to the Sun."
 flavor_spiked_log.9.a:0 "The Old Ways are the best, but theirs are fascinating too."
 flavor_spiked_log.9.b:0 "This Surael seems like an interesting guy!"
 spiked_log_remove_rel_zeal_tt:0 "Remove the §YReligious Zeal§! modifier in every owned and subject province."
 
 flavor_spiked_log.10.t:0 "Feystomper Stampede"
 flavor_spiked_log.10.d:0 "Maybe we shouldn't have tried to mass-breed giant boars. They're running amok and destroying our ranches."
 flavor_spiked_log.10.a:0 "Oops..."
 spiked_log_stampede_explanation_tt:0 "§YFeystompers§! attack every §YLivestock§! provinces in the §YArrow Grove§!. Other §YLivestock§! provinces owned by us or our subjects in the Deepwoods have a §Y50%§! chance to be attacked too.\n\nEvery province attacked by Feystompers will get the '§YChaotic Ranch§!' modifier (§R-50%§! Local Production Efficiency, §R+0.2§! Monthly Local Devastation) until we §Ybring the sitution back under our control§!.\n"
 spiked_log_stampede_mission_unlock_tt:0 "\nWe can now complete mission '§YFeystomper Overcrowding§!'."
 
 flavor_spiked_log.11.t:0 "Unleash the Beasts"
 flavor_spiked_log.11.d:0 "It seems like, surprisingly, mass-breeding giant boars might not have been the best idea we ever had. We can get rid of our excess herd by unleashing it on our neighbours, but it should mainly be an opportunity to establish a Ranchers Cartel to properly handle our herds going forwards. "
 flavor_spiked_log.11.a:0 "It's their problem now!"
 
 flavor_spiked_log.12.t:0 "A Meeting with Cartels"
 flavor_spiked_log.12.d:0 "Even if we did establish four Cartels to meet our needs, they complained that they lacked funds to properly setup their activities. Now that we own the bottomless mines of Yfelorr, we can give them as much funding as they want."
 flavor_spiked_log.12.a:0 "I'll give you as much money as you want, so stop complaining!"
 spiked_log_removal_of_unchecked_spending_tt:0 "We will get rid of the '§YUnchecked Cartel Spending§!' modifier after we complete both missions §YCartel Collaboration§! and §YExpand Log Production§!."
 
 flavor_spiked_log.13.t:0 "Tales about Knights"
 flavor_spiked_log.13.d:0 "The tale continues about Escanni knights, humans who don shiny armors and ride giant beasts. Even though these knights killed many of goblins, their deadliness created a very appeal among Feystomper riders who heard of them. They would create a knightly order of their own, only open to the bravest (and most fearless) riders."
 flavor_spiked_log.13.a:0 "An interesting tale..."
 
 flavor_spiked_log.14.t:0 "Tales about the Greentide"
 flavor_spiked_log.14.d_1:0 "The tale continues about the Greentide, its failure due to Corin killing Korgus Dookanson, and our role in definitely crushing the Greentide remnants here in the Deepwoods. It is a lenghty process and tensions linger even with our efforts towards reconciliation"
 flavor_spiked_log.14.d_2:0 "The tale continues about the Greentide, its failure due to Corin killing Korgus Dookanson, and our role in definitely crushing the Greentide remnants here in the Deepwoods. We went further than that, as we tend to kill orcs on sight. Is there a point in that? And didn't we become what we despised in orcs?"
 flavor_spiked_log.14.a:0 "Our endeavour was worth it!"
 flavor_spiked_log.14.b:0 "They had it coming!"
 
 flavor_spiked_log.15.t:0 "Tales about Goblins"
 flavor_spiked_log.15.d:0 "The tale continues about goblins, and how goblins of many origins made the Spiked Log clan their home. A home for those who were always here, for those who fled, those who fought. Maybe, one day, for those exiled in the Garden Lands and for those who stayed in the dark caves under the Spine."
 flavor_spiked_log.15.a:0 "An interesting tale..."
 spiked_log_goblin_haven_tt:0 "Every owned province with a goblin majority gains '§YGoblin Haven§!', giving the following modifers: §G-0.05§! Monthly Autonomy, §G+0.05§! Monthly Prosperity Growth"
 
 flavor_spiked_log.16.t:0 "Tales about the Fey"
 flavor_spiked_log.16.d:0 "The tale continues about the treacherous fey and why refusing them is arguably the good thing to do. Also some romanticized description of the mighty battle against the Elves."
 flavor_spiked_log.16.a:0 "An interesting tale..."
 spiked_log_disband_verdant_pact_tt:0 "We will §Gdisband§! the §YVerdant Pact§!."
 
 flavor_spiked_log.17.t:0 "A Tale of Many Tales"
 flavor_spiked_log.17.d:0 "The tale ends. After a silence, the storyteller starts talking with his audience about the authenticity of it all. Event loc would zoom out and transition from story time to the bustling life of the clan on the brink of becoming a technocracy."
 flavor_spiked_log.17.a:0 "These were fine tales, now get back to work!"
 
 
 
 
 
